<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Rank Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #1e1e2e; color: white; margin: 0; padding: 30px; }
        
        /* Main Dashboard Card */
        .dashboard-card { max-width: 800px; margin: 0 auto; background: #2f3136; padding: 25px; border-radius: 16px; border: 1px solid #40444b; }

        /* Header & Save Button */
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 700; color: #ffffff; }
        .header p { margin: 4px 0 0 0; color: #b9bbbe; font-size: 14px; }
        
        .btn-save { background: #45ddc0; color: #1e1e2e; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-save:hover { background: #3bc9b0; transform: scale(1.02); }
        .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Preview Box */
        .preview-box { 
            width: 100%; 
            aspect-ratio: 900 / 250; /* Forces exact card size! */
            background: #202225; 
            border-radius: 10px; 
            margin-bottom: 25px; 
            overflow: hidden; 
            border: 2px solid #40444b; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .preview-img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }

        /* 2-Column Grid for Controls */
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media (max-width: 650px) { .controls-grid { grid-template-columns: 1fr; } }

        .control-group { background: #36393f; padding: 20px; border-radius: 10px; border: 1px solid #40444b; }
        .control-group h3 { margin: 0 0 15px 0; color: #ffffff; font-size: 15px; font-weight: 600; }
        
        .input-row { margin-bottom: 18px; }
        .input-row:last-child { margin-bottom: 0; }
        
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #b9bbbe; font-size: 13px; }
        
        /* Custom Input Styling to look like Arcane */
        select, input[type="number"] { width: 100%; padding: 10px; background: #2f3136; color: white; border: 1px solid #40444b; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; }
        select:focus, input:focus { border-color: #5865F2; }
        
        input[type="color"] { width: 100%; height: 50px; border: 2px solid #40444b; border-radius: 6px; background: transparent; cursor: pointer; padding: 2px; outline: none; }
        input[type="color"]:hover { border-color: #5865F2; }

        input[type="range"] { width: 100%; accent-color: #5865F2; height: 4px; background: #40444b; border-radius: 4px; -webkit-appearance: none; appearance: none; outline: none; margin-top: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #5865F2; cursor: pointer; }

        .range-labels { display: flex; justify-content: space-between; font-size: 11px; color: #b9bbbe; margin-top: 2px; }

        /* Upload Area */
        .upload-area { border: 2px dashed #40444b; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .upload-area:hover { border-color: #5865F2; background: #2f3136; }
        .upload-area p { margin: 5px 0; color: #b9bbbe; font-size: 13px; }
        .upload-area input { display: none; }
        .file-status { color: #45ddc0; font-size: 12px; margin-top: 5px; display: none; font-weight: 600; }

        /* Reset Button */
        .reset-btn { background: transparent; color: #b9bbbe; border: 1px solid #40444b; padding: 10px; border-radius: 6px; font-weight: 600; font-size: 14px; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.2s; }
        .reset-btn:hover { background: #ed4245; color: white; border-color: #ed4245; }
    </style>
</head>
<body>

<div class="dashboard-card">
    <div class="header">
        <div>
            <h1>Edit Rank Card</h1>
            <p>Refresh preview..</p>
        </div>
        <button class="btn-save" id="saveBtn" onclick="saveCard()">Save card</button>
    </div>

    <!-- Preview Image -->
    <div class="preview-box">
        <img src="" id="previewImg" class="preview-img" alt="Card Preview Loading...">
    </div>

    <form id="configForm">
        <div class="controls-grid">
            
            <!-- LEFT COLUMN: Typography -->
            <div class="control-group">
                <h3>Typography</h3>
                
                <div class="input-row">
                    <label>Font Family</label>
                    <select id="font_family">
                        <option value="Inter">Inter</option>
                        <option value="Roboto">Roboto</option>
                        <option value="Open Sans">Open Sans</option>
                        <option value="Montserrat">Montserrat</option>
                    </select>
                </div>

                <div class="input-row">
                    <label>Font Size</label>
                    <input type="range" id="font_size" min="20" max="80" value="48">
                    <div class="range-labels">
                        <span>Small</span>
                        <span id="font_size_val">48px</span>
                        <span>Large</span>
                    </div>
                </div>

                <div class="input-row">
                    <label>Font Color</label>
                    <input type="color" id="font_color" value="#ffffff">
                </div>

                <div class="input-row" style="margin-bottom: 0;">
                    <label>Stats Color</label>
                    <input type="color" id="stats_color" value="#b9bbbe">
                </div>
            </div>

            <!-- RIGHT COLUMN: Visuals & Background -->
            <div class="control-group">
                <h3>Visuals</h3>

                <div class="input-row">
                    <label>Progress Bar Color</label>
                    <input type="color" id="bar_color" value="#5865F2">
                </div>

                <div class="input-row">
                    <label>Overlay Opacity</label>
                    <input type="range" id="opacity" min="0" max="180" value="100">
                    <div class="range-labels">
                        <span>Transparent</span>
                        <span id="opacity_val">100</span>
                        <span>Dark</span>
                    </div>
                </div>
                
                <div class="input-row">
                    <label>Background Color (Fallback)</label>
                    <input type="color" id="bg_color" value="#2f3136">
                </div>

                <div class="input-row" style="margin-bottom: 0;">
                    <label>Custom Background</label>
                    <div class="upload-area" onclick="document.getElementById('bg_upload').click()">
                        <p>Upload a background</p>
                        <input type="file" id="bg_upload" accept="image/png,image/jpeg,image/gif,image/webp">
                        <div class="file-status" id="file_status">✅ Uploaded!</div>
                    </div>
                </div>
            </div>
        </div>

        <button type="button" class="reset-btn" onclick="resetDefaults()">↺ Reset to Defaults</button>
    </form>
</div>

<script>
    const user_id = "{{ user_id }}";
    let config = {{ config | tojson }};

    // Apply saved settings to inputs
    document.getElementById('font_family').value = config.font_family || 'Inter';
    document.getElementById('font_color').value = config.font_color || '#ffffff';
    document.getElementById('stats_color').value = config.stats_color || '#b9bbbe';
    document.getElementById('bar_color').value = config.bar_color || '#5865F2';
    document.getElementById('opacity').value = config.opacity || 100;
    document.getElementById('bg_color').value = config.bg_color || '#2f3136';
    document.getElementById('font_size').value = config.font_size || 48;
    document.getElementById('font_size_val').innerText = (config.font_size || 48) + 'px';
    document.getElementById('opacity_val').innerText = config.opacity || 100;

    // Live Preview Logic
    async function updatePreview() {
        const formData = {
            font_family: document.getElementById('font_family').value,
            font_color: document.getElementById('font_color').value,
            stats_color: document.getElementById('stats_color').value,
            bar_color: document.getElementById('bar_color').value,
            opacity: document.getElementById('opacity').value,
            bg_color: document.getElementById('bg_color').value,
            font_size: document.getElementById('font_size').value
        };

        const params = new URLSearchParams(formData);
        document.getElementById('previewImg').src = `/get_card/${user_id}?${params.toString()}&_=${Date.now()}`;
    }

    // Update display values
    document.getElementById('font_size').addEventListener('input', function() {
        document.getElementById('font_size_val').innerText = this.value + 'px';
        updatePreview();
    });
    document.getElementById('opacity').addEventListener('input', function() {
        document.getElementById('opacity_val').innerText = this.value;
        updatePreview();
    });

    // Preview on every change
    document.querySelectorAll('select, input[type="color"], input[type="range"]').forEach(input => {
        input.addEventListener('input', updatePreview);
        input.addEventListener('change', updatePreview);
    });

    // Background Image Upload
    document.getElementById('bg_upload').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('bg_image', file);

        document.getElementById('file_status').style.display = 'block';
        document.getElementById('file_status').innerText = '⏳ Uploading...';

        const res = await fetch(`/upload_bg/${user_id}`, {
            method: 'POST',
            body: formData
        });

        if(res.ok) {
            document.getElementById('file_status').innerText = '✅ Uploaded!';
            updatePreview();
        } else {
            document.getElementById('file_status').innerText = '❌ Upload failed.';
        }
    });

    // Save Logic
    async function saveCard() {
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = "Saving...";

        const data = {
            font_family: document.getElementById('font_family').value,
            font_color: document.getElementById('font_color').value,
            stats_color: document.getElementById('stats_color').value,
            bar_color: document.getElementById('bar_color').value,
            opacity: parseInt(document.getElementById('opacity').value),
            bg_color: document.getElementById('bg_color').value,
            font_size: parseInt(document.getElementById('font_size').value)
        };

        try {
            const res = await fetch(`/save_config/${user_id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if(res.ok) {
                alert("✅ Settings saved! Run !level in Discord to see your new card.");
            } else {
                alert("❌ Error saving settings.");
            }
        } catch (e) {
            alert("❌ Network error.");
        }

        btn.disabled = false;
        btn.innerText = "Save card";
    }

    // Reset to Defaults
    async function resetDefaults() {
        if(!confirm("Reset all your customization to server defaults?")) return;

        const res = await fetch(`/reset_config/${user_id}`, { method: 'POST' });
        if(res.ok) {
            location.reload();
        } else {
            alert("❌ Failed to reset.");
        }
    }

    // Trigger first preview
    setTimeout(updatePreview, 100);
</script>
</body>
</html>
