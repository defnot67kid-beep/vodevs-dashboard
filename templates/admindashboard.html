<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Server Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #12121a; color: #e2e2e2; padding: 30px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #2f3136; padding-bottom: 20px; }
        .header h1 { color: #45ddc0; display: flex; align-items: center; gap: 10px; }
        .nav a { color: #ff5555; text-decoration: none; font-weight: bold; background: #2f3136; padding: 8px 16px; border-radius: 8px; border: 1px solid #40444b; }
        .nav a:hover { background: #3f4146; }

        .admin-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        @media (max-width: 1000px) { .admin-grid { grid-template-columns: 1fr; } }

        .card { background: #1e1e2e; border: 1px solid #2f3136; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .card-title { font-weight: 700; color: #b9bbbe; margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #2f3136; padding-bottom: 10px; }

        .search-bar { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #40444b; background: #202225; color: white; font-size: 16px; outline: none; margin-bottom: 15px; }
        .search-bar:focus { border-color: #5865F2; }

        .user-row { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid #26262e; }
        .user-row:last-child { border-bottom: none; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; }
        .user-name { font-weight: 600; flex: 1; color: white; }
        .user-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; font-weight: 600; font-size: 12px; cursor: pointer; color: white; transition: 0.2s; text-decoration: none; display: inline-block;}
        .btn-kick { background: #faa61a; }
        .btn-mute { background: #5865F2; }
        .btn-timeout { background: #ed4245; }
        .btn-ban { background: #ed4245; }
        .btn-primary { background: #5865F2; width: 100%; padding: 10px; margin-top: 10px; }
        .btn-primary:hover { background: #4752c4; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #b9bbbe; font-size: 14px; margin-bottom: 5px; }
        .form-control { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #40444b; background: #202225; color: white; outline: none; }
        .form-control:focus { border-color: #5865F2; }

        textarea.form-control { resize: vertical; min-height: 80px; }

        .poll-option { display: flex; gap: 10px; margin-bottom: 10px; }
        .poll-option input { flex: 1; }
        .add-option-btn { background: #2f3136; border: 1px dashed #b9bbbe; color: #b9bbbe; padding: 5px 15px; border-radius: 6px; cursor: pointer; width: 100%; }

        .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; text-transform: capitalize; }
        .status-online { background: #3ba55c; color: white; }
        .status-idle { background: #faa61a; color: white; }
        .status-dnd { background: #ed4245; color: white; }
        .status-offline { background: #4f545c; color: white; }
        
        /* Modal Overlay for Moderation Actions */
        #modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:1000; }
        #modal-box { background: #1e1e2e; padding: 30px; border-radius: 12px; border: 1px solid #2f3136; width: 400px; max-width: 90%; }
        #modal-box h2 { color: #45ddc0; margin-bottom: 15px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end; }
        .btn-cancel { background: #4f545c; padding: 10px 20px; border: none; border-radius: 6px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Admin Server Panel</h1>
            <div class="nav">
                <span style="color: #b9bbbe; margin-right: 15px;">Logged in as {{ admin_username }}</span>
                <a href="/admin/logout">Logout</a>
            </div>
        </div>

        <div class="admin-grid">
            <!-- LEFT SIDEBAR: Tools -->
            <div class="left-sidebar">
                <!-- Poll Creator -->
                <div class="card">
                    <div class="card-title">📊 Create Poll</div>
                    <form action="/admin/create_poll" method="POST">
                        <div class="form-group">
                            <label>Poll Question</label>
                            <input type="text" name="question" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Options</label>
                            <div id="poll-options-container">
                                <div class="poll-option"><input type="text" name="options[]" class="form-control" placeholder="Option 1" required></div>
                                <div class="poll-option"><input type="text" name="options[]" class="form-control" placeholder="Option 2" required></div>
                            </div>
                            <button type="button" class="add-option-btn" onclick="addPollOption()">+ Add Option</button>
                        </div>
                        <button type="submit" class="btn btn-primary">Create Poll</button>
                    </form>
                </div>

                <!-- Announcement Creator -->
                <div class="card">
                    <div class="card-title">📢 Global Announcement</div>
                    <form action="/admin/send_announcement" method="POST">
                        <div class="form-group">
                            <label>Channel ID (Optional)</label>
                            <input type="text" name="channel_id" class="form-control" value="1526730287378075648">
                        </div>
                        <div class="form-group">
                            <label>Message Content</label>
                            <textarea name="content" class="form-control" required placeholder="Enter announcement text here..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Send Announcement</button>
                    </form>
                </div>

                <!-- Reaction Roles Configuration -->
                <div class="card">
                    <div class="card-title">🔘 Create Reaction Role Menu</div>
                    <form id="rrForm" onsubmit="createReactionRole(event)">
                        <div class="form-group">
                            <label>Channel ID</label>
                            <input type="text" id="rr_channel_id" class="form-control" required placeholder="ID of channel to post to">
                        </div>
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" id="rr_title" class="form-control" required placeholder="Menu Title">
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="rr_description" class="form-control" placeholder="Description..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Embed Color</label>
                            <input type="color" id="rr_color" class="form-control" value="#5865F2">
                        </div>
                        
                        <div class="card-title" style="margin-top: 15px; border-top: 1px solid #26262e; padding-top: 15px;">Add Roles</div>
                        <div id="rr_roles_container">
                            <div class="rr-role-row" style="display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-end;">
                                <div style="flex: 1;"><label style="font-size: 12px;">Emoji</label><input type="text" class="form-control rr-emoji" placeholder="✅" required></div>
                                <div style="flex: 2;"><label style="font-size: 12px;">Role ID</label><input type="text" class="form-control rr-roleid" placeholder="123456789" required></div>
                                <div style="flex: 2;"><label style="font-size: 12px;">Description</label><input type="text" class="form-control rr-desc" placeholder="Access to..."></div>
                            </div>
                        </div>
                        <button type="button" class="add-option-btn" style="margin-bottom: 15px;" onclick="addRRRole()">+ Add Role</button>

                        <button type="submit" class="btn btn-primary" id="rrSubmitBtn">Create Reaction Role Menu</button>
                        <div id="rrResult" style="margin-top: 10px; font-weight: bold; color: #45ddc0;"></div>
                    </form>
                </div>
            </div>

            <!-- RIGHT SIDEBAR: User Management -->
            <div class="right-content">
                <!-- User Search -->
                <div class="card">
                    <div class="card-title">👥 Server Members <span id="memberCount">(Loading...)</span></div>
                    <input type="text" id="userSearchInput" class="search-bar" placeholder="🔍 Search by username or ID..." onkeyup="filterUsers()">
                    
                    <div id="userListContainer">
                        <div style="padding: 20px; color: #b9bbbe; text-align: center;">Loading members from Discord...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODERATION ACTION MODAL -->
    <div id="modal-overlay">
        <div id="modal-box">
            <h2 id="modalTitle">Moderate User</h2>
            <form id="modalForm">
                <input type="hidden" name="user_id" id="modalUserId">
                <input type="hidden" name="action" id="modalAction">
                
                <div class="form-group">
                    <label>Reason</label>
                    <input type="text" name="reason" class="form-control" required placeholder="Reason for action...">
                </div>
                <div class="form-group" id="durationGroup">
                    <label>Duration (seconds)</label>
                    <input type="number" name="duration" class="form-control" value="60" min="1">
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="width: auto;">Execute Action</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ------------------------------------------
        // GLOBALS
        // ------------------------------------------
        const GUILD_ID = "{{ guild_id }}"; 

        // ------------------------------------------
        // LOAD SERVER MEMBERS ON PAGE LOAD
        // ------------------------------------------
        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('userListContainer');
            const memberCount = document.getElementById('memberCount');

            try {
                const response = await fetch('/api/proxy/get_members', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ guild_id: GUILD_ID })
                });
                const data = await response.json();

                if(data.status === 'success') {
                    memberCount.innerText = `(${data.members.length})`;
                    container.innerHTML = ''; 

                    if(data.members.length === 0) {
                        container.innerHTML = '<div style="padding: 20px; color: #b9bbbe; text-align: center;">No members found. Is the bot in the server?</div>';
                        return;
                    }

                    data.members.forEach(user => {
                        const row = document.createElement('div');
                        row.className = 'user-row';
                        row.setAttribute('data-username', user.name.toLowerCase());
                        row.setAttribute('data-id', user.id);
                        
                        row.innerHTML = `
                            <img src="${user.avatar_url}" class="user-avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                            <span class="user-name">${user.name}</span>
                            <span class="status-badge status-${user.status}">${user.status}</span>
                            
                            <div class="user-actions">
                                <button class="btn btn-timeout" onclick="openModal('${user.id}', '${user.name}', 'timeout')">Timeout</button>
                                <button class="btn btn-mute" onclick="openModal('${user.id}', '${user.name}', 'mute')">Mute</button>
                                <button class="btn btn-kick" onclick="openModal('${user.id}', '${user.name}', 'kick')">Kick</button>
                                <button class="btn btn-ban" onclick="openModal('${user.id}', '${user.name}', 'ban')">Ban</button>
                            </div>
                        `;
                        container.appendChild(row);
                    });
                } else {
                    container.innerHTML = `<div style="padding: 20px; color: #ff5555; text-align: center;">Error: ${data.message}</div>`;
                }
            } catch (e) {
                container.innerHTML = `<div style="padding: 20px; color: #ff5555; text-align: center;">Failed to connect to bot API: ${e}</div>`;
            }
        });

        // ------------------------------------------
        // SEARCH USERS
        // ------------------------------------------
        function filterUsers() {
            const input = document.getElementById('userSearchInput');
            const filter = input.value.toLowerCase();
            const rows = document.querySelectorAll('#userListContainer .user-row');

            rows.forEach(row => {
                const name = row.getAttribute('data-username');
                const id = row.getAttribute('data-id');
                if (name.includes(filter) || id.includes(filter)) {
                    row.style.display = 'flex';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        // ------------------------------------------
        // CREATE REACTION ROLE
        // ------------------------------------------
        async function createReactionRole(event) {
            event.preventDefault();
            const btn = document.getElementById('rrSubmitBtn');
            const resultDiv = document.getElementById('rrResult');
            
            btn.disabled = true; btn.innerText = "Creating..."; resultDiv.innerText = "";

            const channelId = document.getElementById('rr_channel_id').value;
            const title = document.getElementById('rr_title').value;
            const description = document.getElementById('rr_description').value;
            const color = document.getElementById('rr_color').value;

            const roleRows = document.querySelectorAll('.rr-role-row');
            const roles = [];
            roleRows.forEach(row => {
                const emoji = row.querySelector('.rr-emoji').value;
                const roleId = row.querySelector('.rr-roleid').value;
                const desc = row.querySelector('.rr-desc').value;
                if(emoji && roleId) roles.push({ emoji, role_id: parseInt(roleId), description: desc });
            });

            if(roles.length === 0) {
                resultDiv.style.color = "#ff5555"; resultDiv.innerText = "❌ Please add at least one role.";
                btn.disabled = false; btn.innerText = "Create Reaction Role Menu"; return;
            }

            try {
                const response = await fetch('/api/proxy/create_reaction_role', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ guild_id: GUILD_ID, channel_id: parseInt(channelId), title, description, color, roles })
                });
                const data = await response.json();
                if(response.ok) {
                    resultDiv.style.color = "#45ddc0"; resultDiv.innerText = `✅ Created! Message ID: ${data.message_id}`;
                } else {
                    resultDiv.style.color = "#ff5555"; resultDiv.innerText = `❌ Error: ${data.message}`;
                }
            } catch (e) {
                resultDiv.style.color = "#ff5555"; resultDiv.innerText = `❌ Connection Error: ${e}`;
            } finally {
                btn.disabled = false; btn.innerText = "Create Reaction Role Menu";
            }
        }

        // ------------------------------------------
        // MODERATION MODAL & ACTION
        // ------------------------------------------
        function openModal(userId, userName, action) {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('modalUserId').value = userId;
            document.getElementById('modalAction').value = action;
            document.getElementById('modalTitle').innerText = `${action.toUpperCase()} - ${userName}`;
            
            const durationGroup = document.getElementById('durationGroup');
            if (action === 'kick' || action === 'ban') {
                durationGroup.style.display = 'none';
            } else {
                durationGroup.style.display = 'block';
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        document.getElementById('modal-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // SEND MODERATION ACTION TO BOT
        document.getElementById('modalForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.querySelector('#modalForm .btn-primary');
            btn.disabled = true; btn.innerText = "Executing...";

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            data.guild_id = GUILD_ID;

            try {
                const response = await fetch('/api/proxy/mod_action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                closeModal();
                if(result.status === 'success') {
                    alert(`✅ ${result.action.toUpperCase()} executed successfully!`);
                } else {
                    alert(`❌ Error: ${result.message}`);
                }
            } catch (e) {
                alert(`❌ Failed to contact bot: ${e}`);
            } finally {
                btn.disabled = false; btn.innerText = "Execute Action";
            }
        });

        // ------------------------------------------
        // HELPERS FOR ADDING OPTIONS
        // ------------------------------------------
        function addPollOption() {
            const container = document.getElementById('poll-options-container');
            const count = container.children.length + 1;
            const div = document.createElement('div');
            div.className = 'poll-option';
            div.innerHTML = `<input type="text" name="options[]" class="form-control" placeholder="Option ${count}" required>`;
            container.appendChild(div);
        }

        function addRRRole() {
            const container = document.getElementById('rr_roles_container');
            const div = document.createElement('div');
            div.className = 'rr-role-row';
            div.style = "display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-end;";
            div.innerHTML = `
                <div style="flex: 1;"><label style="font-size: 12px;">Emoji</label><input type="text" class="form-control rr-emoji" placeholder="✅" required></div>
                <div style="flex: 2;"><label style="font-size: 12px;">Role ID</label><input type="text" class="form-control rr-roleid" placeholder="123456789" required></div>
                <div style="flex: 2;"><label style="font-size: 12px;">Description</label><input type="text" class="form-control rr-desc" placeholder="Access to..."></div>
            `;
            container.appendChild(div);
        }
    </script>
</body>
</html>
