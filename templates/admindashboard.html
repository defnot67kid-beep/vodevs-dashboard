<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Server Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #12121a; color: #e2e2e2; padding: 30px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #2f3136; padding-bottom: 20px; }
        .header h1 { color: #45ddc0; display: flex; align-items: center; gap: 10px; }
        .nav a { color: #ff5555; text-decoration: none; font-weight: bold; background: #2f3136; padding: 8px 16px; border-radius: 8px; border: 1px solid #40444b; }
        .nav a:hover { background: #3f4146; }
        .admin-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        @media (max-width: 1000px) { .admin-grid { grid-template-columns: 1fr; } }
        .card { background: #1e1e2e; border: 1px solid #2f3136; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .card-title { font-weight: 700; color: #b9bbbe; margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #2f3136; padding-bottom: 10px; }
        
        .search-bar { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #40444b; background: #202225; color: white; font-size: 16px; outline: none; margin-bottom: 15px; }
        .search-bar:focus { border-color: #5865F2; }
        .user-row { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid #26262e; }
        .user-row:last-child { border-bottom: none; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; }
        .user-name { font-weight: 600; flex: 1; color: white; }
        .user-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; font-weight: 600; font-size: 12px; cursor: pointer; color: white; transition: 0.2s; text-decoration: none; display: inline-block;}
        .btn-kick { background: #faa61a; }
        .btn-mute { background: #5865F2; }
        .btn-timeout { background: #ed4245; }
        .btn-ban { background: #ed4245; }
        .btn-warn { background: #faa61a; } /* New Warn Button Color */
        .btn-primary { background: #5865F2; width: 100%; padding: 10px; margin-top: 10px; }
        .btn-primary:hover { background: #4752c4; }
        .btn-success { background: #3ba55c; width: 100%; padding: 10px; margin-top: 10px; }
        .btn-success:hover { background: #2e884a; }
        .btn-warning { background: #faa61a; width: 100%; padding: 10px; margin-top: 10px; }
        .btn-warning:hover { background: #d68b10; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #b9bbbe; font-size: 14px; margin-bottom: 5px; }
        .form-control { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #40444b; background: #202225; color: white; outline: none; }
        .form-control:focus { border-color: #5865F2; }
        textarea.form-control { resize: vertical; min-height: 80px; }
        .poll-option { display: flex; gap: 10px; margin-bottom: 10px; }
        .poll-option input { flex: 1; }
        .add-option-btn { background: #2f3136; border: 1px dashed #b9bbbe; color: #b9bbbe; padding: 5px 15px; border-radius: 6px; cursor: pointer; width: 100%; }
        .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; text-transform: capitalize; }
        .status-online { background: #3ba55c; color: white; }
        .status-idle { background: #faa61a; color: white; }
        .status-dnd { background: #ed4245; color: white; }
        .status-offline { background: #4f545c; color: white; }
        
        #modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:1000; }
        #modal-box { background: #1e1e2e; padding: 30px; border-radius: 12px; border: 1px solid #2f3136; width: 400px; max-width: 90%; }
        #modal-box h2 { color: #45ddc0; margin-bottom: 15px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end; }
        .btn-cancel { background: #4f545c; padding: 10px 20px; border: none; border-radius: 6px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Admin Server Panel</h1>
            <div class="nav">
                <span style="color: #b9bbbe; margin-right: 15px;">Logged in as {{ admin_username }}</span>
                <a href="/admin/logout">Logout</a>
            </div>
        </div>

        <div class="admin-grid">
            <div class="left-sidebar">
                <!-- 1. UNBAN TOOL -->
                <div class="card">
                    <div class="card-title">🔓 Unban User by ID</div>
                    <form id="unbanForm" onsubmit="submitUnban(event)">
                        <div class="form-group">
                            <label>User ID</label>
                            <input type="text" id="unban_user_id" class="form-control" required placeholder="123456789012345678">
                        </div>
                        <div class="form-group">
                            <label>Reason</label>
                            <input type="text" id="unban_reason" class="form-control" placeholder="Unban reason...">
                        </div>
                        <button type="submit" class="btn btn-success">Unban User</button>
                    </form>
                </div>

                <!-- 2. CREATE POLL -->
                <div class="card">
                    <div class="card-title">📊 Create Poll</div>
                    <form id="pollForm" onsubmit="submitPoll(event)">
                        <div class="form-group">
                            <label>Channel ID</label>
                            <input type="text" name="channel_id" id="poll_channel" class="form-control" placeholder="123456789012345678">
                        </div>
                        <div class="form-group">
                            <label>Poll Question</label>
                            <input type="text" name="question" id="poll_question" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Options</label>
                            <div id="poll-options-container">
                                <div class="poll-option"><input type="text" name="options[]" class="form-control" placeholder="Option 1" required></div>
                                <div class="poll-option"><input type="text" name="options[]" class="form-control" placeholder="Option 2" required></div>
                            </div>
                            <button type="button" class="add-option-btn" onclick="addPollOption()">+ Add Option</button>
                        </div>
                        <div class="form-group">
                            <label>Duration</label>
                            <input type="text" name="duration" id="poll_duration" class="form-control" value="15m" required>
                        </div>
                        <div class="form-group">
                            <label>Type</label>
                            <input type="text" name="poll_type" id="poll_type" class="form-control" value="single" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Create Poll</button>
                    </form>
                </div>

                <!-- 3. GLOBAL ANNOUNCEMENT -->
                <div class="card">
                    <div class="card-title">📢 Global Announcement</div>
                    <form id="announcementForm" onsubmit="submitAnnouncement(event)">
                        <div class="form-group"><label>Channel ID</label><input type="text" name="channel_id" id="announce_channel" class="form-control" value="1526730287378075648"></div>
                        <div class="form-group"><label>Message Content</label><textarea name="content" id="announce_content" class="form-control" required></textarea></div>
                        <button type="submit" class="btn btn-primary">Send Announcement</button>
                    </form>
                </div>

                <!-- 4. REACTION ROLES (STEP 1: CREATE MENU) -->
                <div class="card">
                    <div class="card-title">🔘 Step 1: Create Role Menu</div>
                    <form id="rrCreateForm" onsubmit="createReactionRole(event)">
                        <div class="form-group"><label>Channel ID</label><input type="text" id="rr_channel_id" class="form-control" required></div>
                        <div class="form-group"><label>Title</label><input type="text" id="rr_title" class="form-control" required></div>
                        <div class="form-group"><label>Description</label><textarea id="rr_description" class="form-control"></textarea></div>
                        <div class="form-group"><label>Embed Color</label><input type="color" id="rr_color" class="form-control" value="#5865F2"></div>
                        <button type="submit" class="btn btn-success" id="rrSubmitBtn">Create Empty Menu</button>
                        <div id="rrResult" style="margin-top: 10px; font-weight: bold; color: #45ddc0;"></div>
                    </form>
                </div>

                <!-- 5. REACTION ROLES (STEP 2: ADD TO MENU) -->
                <div class="card">
                    <div class="card-title">➕ Step 2: Add Role to Menu</div>
                    <form id="rrAddForm" onsubmit="addReactionRole(event)">
                        <div class="form-group"><label>Message ID</label><input type="text" id="rr_msg_id" class="form-control" required placeholder="ID of the menu message"></div>
                        <div class="form-group"><label>Emoji</label><input type="text" id="rr_add_emoji" class="form-control" required placeholder="✅"></div>
                        <div class="form-group"><label>Role ID</label><input type="text" id="rr_add_roleid" class="form-control" required placeholder="123456789"></div>
                        <div class="form-group"><label>Description</label><input type="text" id="rr_add_desc" class="form-control" placeholder="Access to..."></div>
                        <button type="submit" class="btn btn-warning">Add Role to Menu</button>
                    </form>
                </div>

            </div>

            <div class="right-content">
                <!-- 6. MEMBER LIST -->
                <div class="card">
                    <div class="card-title">👥 Server Members ({{ total_members }})</div>
                    <input type="text" id="userSearchInput" class="search-bar" placeholder="🔍 Search by username or ID..." onkeyup="filterUsers()">
                    <div id="userListContainer">
                        {% for user in members %}
                        <div class="user-row" data-username="{{ user.name.lower() }}" data-id="{{ user.id }}">
                            <img src="{{ user.avatar_url }}" class="user-avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                            <span class="user-name">{{ user.name }}</span>
                            <span class="status-badge status-{{ user.status }}">{{ user.status }}</span>
                            <div class="user-actions">
                                <button class="btn btn-timeout" onclick="openModal('{{ user.id }}', '{{ user.name }}', 'timeout')">Timeout</button>
                                <button class="btn btn-mute" onclick="openModal('{{ user.id }}', '{{ user.name }}', 'mute')">Mute</button>
                                <button class="btn btn-kick" onclick="openModal('{{ user.id }}', '{{ user.name }}', 'kick')">Kick</button>
                                <button class="btn btn-ban" onclick="openModal('{{ user.id }}', '{{ user.name }}', 'ban')">Ban</button>
                                <button class="btn btn-warn" onclick="openModal('{{ user.id }}', '{{ user.name }}', 'warn')">Warn</button>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal-overlay">
        <div id="modal-box">
            <h2 id="modalTitle">Moderate User</h2>
            <form id="modalForm">
                <input type="hidden" name="user_id" id="modalUserId">
                <input type="hidden" name="action" id="modalAction">
                <div class="form-group"><label>Reason</label><input type="text" name="reason" class="form-control" required></div>
                <div class="form-group" id="durationGroup"><label>Duration (seconds)</label><input type="number" name="duration" class="form-control" value="60" min="1"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="width: auto;">Execute Action</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const GUILD_ID = "{{ guild_id }}"; 

        function filterUsers() {
            const input = document.getElementById('userSearchInput');
            const filter = input.value.toLowerCase();
            const rows = document.querySelectorAll('#userListContainer .user-row');
            rows.forEach(row => {
                const name = row.getAttribute('data-username');
                const id = row.getAttribute('data-id');
                row.style.display = (name.includes(filter) || id.includes(filter)) ? 'flex' : 'none';
            });
        }

        // HELPER: SAFELY PARSE JSON
        async function safeFetch(url, options) {
            const response = await fetch(url, options);
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch (e) {
                console.error("Server returned HTML instead of JSON:", text.substring(0, 200));
                throw new Error("Server error. Check your Channel ID or Bot Logs.");
            }
        }

        // UNBAN
        async function submitUnban(event) {
            event.preventDefault();
            const userId = document.getElementById('unban_user_id').value.trim();
            const reason = document.getElementById('unban_reason').value.trim() || 'No reason provided.';
            if(!userId) { alert("❌ Please provide a User ID."); return; }

            try {
                const result = await safeFetch('/api/admin/mod_action', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        guild_id: GUILD_ID, 
                        user_id: userId, 
                        action: 'unban', 
                        reason: reason 
                    })
                });
                if(result.status === 'success') { 
                    alert(`✅ Unban queued for bot!`); 
                    document.getElementById('unbanForm').reset(); 
                } else { 
                    alert(`❌ Error: ${result.message}`); 
                }
            } catch (e) { 
                alert(`❌ Failed: ${e.message}`); 
            }
        }

        // CREATE REACTION ROLE MENU
        async function createReactionRole(event) {
            event.preventDefault();
            const btn = document.getElementById('rrSubmitBtn'); const resultDiv = document.getElementById('rrResult');
            btn.disabled = true; btn.innerText = "Creating..."; resultDiv.innerText = "";
            
            const channelId = document.getElementById('rr_channel_id').value; 
            const title = document.getElementById('rr_title').value;
            const description = document.getElementById('rr_description').value; 
            const color = document.getElementById('rr_color').value;

            if(!channelId) { resultDiv.innerText = "❌ Please enter a valid Channel ID."; btn.disabled=false; return; }

            try {
                const result = await safeFetch('/api/admin/create_reaction_role', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ guild_id: GUILD_ID, channel_id: parseInt(channelId), title, description, color, roles: [] })
                });
                if(result.status === 'success') {
                    resultDiv.style.color = "#45ddc0"; resultDiv.innerText = `✅ Menu Created! Msg ID: ${result.message_id}`;
                } else { resultDiv.style.color = "#ff5555"; resultDiv.innerText = `❌ Error: ${result.message}`; }
            } catch (e) { 
                resultDiv.style.color = "#ff5555"; resultDiv.innerText = `❌ Error: ${e.message}`; 
            }
            finally { btn.disabled = false; btn.innerText = "Create Empty Menu"; }
        }

        // ADD ROLE TO REACTION ROLE MENU
        async function addReactionRole(event) {
            event.preventDefault();
            const msgId = document.getElementById('rr_msg_id').value.trim();
            const emoji = document.getElementById('rr_add_emoji').value.trim();
            const roleId = document.getElementById('rr_add_roleid').value.trim();
            const desc = document.getElementById('rr_add_desc').value.trim() || 'No description.';
            if(!msgId || !emoji || !roleId) { alert("❌ Msg ID, Emoji, and Role ID are required."); return; }

            try {
                const result = await safeFetch('/api/admin/add_reaction_role', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ guild_id: GUILD_ID, message_id: msgId, emoji, role_id: parseInt(roleId), description: desc })
                });
                if(result.status === 'success') { alert(`✅ Role added to menu!`); document.getElementById('rrAddForm').reset(); }
                else { alert(`❌ Error: ${result.message}`); }
            } catch (e) { alert(`❌ Failed: ${e.message}`); }
        }

        // POLLS
        async function submitPoll(event) {
            event.preventDefault();
            const channelId = document.getElementById('poll_channel').value.trim();
            const question = document.getElementById('poll_question').value; const duration = document.getElementById('poll_duration').value;
            const poll_type = document.getElementById('poll_type').value;
            const optionsInputs = document.querySelectorAll('#poll-options-container input'); const options = [];
            optionsInputs.forEach(input => { if(input.value.trim() !== '') options.push(input.value.trim()); });
            if(options.length < 2) { alert("❌ Please provide at least 2 options."); return; }
            if(!channelId) { alert("❌ Channel ID is required."); return; }
            try {
                const result = await safeFetch('/api/admin/create_poll', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ guild_id: GUILD_ID, channel_id: channelId, question, options, duration, poll_type })
                });
                if(result.status === 'success') { alert(`✅ Poll queued for bot!`); document.getElementById('pollForm').reset(); document.getElementById('poll-options-container').innerHTML = `
                        <div class="poll-option"><input type="text" name="options[]" class="form-control" placeholder="Option 1" required></div>
                        <div class="poll-option"><input type="text" name="options[]" class="form-control" placeholder="Option 2" required></div>
                    `; }
                else { alert(`❌ Error: ${result.message}`); }
            } catch (e) { alert(`❌ Failed: ${e.message}`); }
        }

        // ANNOUNCEMENTS
        async function submitAnnouncement(event) {
            event.preventDefault();
            const channelId = document.getElementById('announce_channel').value; const content = document.getElementById('announce_content').value;
            if(!content.trim()) { alert("❌ Announcement content cannot be empty."); return; }
            try {
                const result = await safeFetch('/api/admin/send_announcement', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ guild_id: GUILD_ID, channel_id: channelId, content })
                });
                if(result.status === 'success') { alert(`✅ Announcement sent!`); document.getElementById('announcementForm').reset(); }
                else { alert(`❌ Error: ${result.message}`); }
            } catch (e) { alert(`❌ Failed: ${e.message}`); }
        }

        // MODERATION MODAL
        function openModal(userId, userName, action) {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('modalUserId').value = userId; document.getElementById('modalAction').value = action;
            document.getElementById('modalTitle').innerText = `${action.toUpperCase()} - ${userName}`;
            const durationGroup = document.getElementById('durationGroup');
            if (action === 'kick' || action === 'ban' || action === 'warn') durationGroup.style.display = 'none';
            else durationGroup.style.display = 'block';
        }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        document.getElementById('modalForm').addEventListener('submit', async function(e) {
            e.preventDefault(); const btn = document.querySelector('#modalForm .btn-primary');
            btn.disabled = true; btn.innerText = "Executing...";
            const formData = new FormData(this); const data = Object.fromEntries(formData.entries());
            data.guild_id = GUILD_ID;
            try {
                const result = await safeFetch('/api/admin/mod_action', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
                });
                closeModal();
                if(result.status === 'success') { const actionName = result.action ? result.action.toUpperCase() : 'Action'; alert(`✅ ${actionName} executed successfully!`); }
                else { alert(`❌ Error: ${result.message}`); }
            } catch (e) { alert(`❌ Failed: ${e.message}`); }
            finally { btn.disabled = false; btn.innerText = "Execute Action"; }
        });

        function addPollOption() {
            const container = document.getElementById('poll-options-container');
            const count = container.children.length + 1; const div = document.createElement('div');
            div.className = 'poll-option'; div.innerHTML = `<input type="text" name="options[]" class="form-control" placeholder="Option ${count}" required>`;
            container.appendChild(div);
        }
    </script>
</body>
</html>
